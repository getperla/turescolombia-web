# CI workflow para La Perla
# Plan 1: db-foundation-schema-and-rls (TST-06)
# Created: 2026-04-27
#
# Bloquea merge de PRs si:
#   - typecheck (tsc --noEmit) falla
#   - eslint reporta errores
#   - vitest run falla
#   - playwright test falla
#   - migrations no aplican clean en Supabase local

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint + TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint

  unit-and-integration-tests:
    name: Vitest (unit + integration)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run vitest
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
        run: npx vitest run --coverage

  e2e-tests:
    name: Playwright (E2E)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Build app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: https://turescolombia-api.onrender.com/api
        run: npm run build
      - name: Start app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
        run: npm start &
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Run Playwright
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  # Job opcional: aplica migrations en Supabase local y corre RLS audit
  # Requiere supabase CLI (instalada por github actions)
  supabase-migrations:
    name: Supabase migrations + RLS audit
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase local
        run: supabase start
      - name: Verify migrations apply clean
        run: |
          supabase db reset
          # El reset corre todas las migrations en orden
      - name: RLS audit
        run: |
          supabase db query "SELECT public.count_unprotected_core_tables() as unprotected"
          # Idealmente parsear output y assert == 0
