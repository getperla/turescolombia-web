<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pearl" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#FFF5E8;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#F0DCC0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#D4B896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4A070;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="25%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="shine2" cx="65%" cy="70%" r="15%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#C4A070" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Pearl sphere -->
  <circle cx="100" cy="100" r="90" fill="url(#pearl)" filter="url(#shadow)"/>
  <!-- Main shine -->
  <circle cx="100" cy="100" r="90" fill="url(#shine)"/>
  <!-- Secondary shine -->
  <circle cx="100" cy="100" r="90" fill="url(#shine2)"/>
  <!-- Subtle continent outlines (Americas) -->
  <path d="M70,45 Q65,55 68,65 Q72,72 70,80 Q65,90 60,100 Q58,110 62,120 Q68,135 75,145 Q80,150 78,155"
        fill="none" stroke="#C4A070" stroke-width="1.5" opacity="0.3"/>
  <path d="M75,45 Q78,50 82,48 Q88,52 85,60 Q80,65 78,75 Q82,80 80,85 Q75,95 72,105 Q70,115 75,125 Q80,138 85,148"
        fill="none" stroke="#C4A070" stroke-width="1.5" opacity="0.3"/>
  <!-- Edge highlight -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#FFF5E8" stroke-width="0.5" opacity="0.6"/>
</svg>
